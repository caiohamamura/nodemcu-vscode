[nodemcu]
; Lua version: 51 or 53
lua_version = 53
; lua_number_integral and lua_number_64bits are mutually exclusive
lua_number_integral = false
lua_number_64bits = false
; Serial port and baud
port =
baud = 460800
upload_baud = 460800
src = src
; Flash parameters
flash_mode = dio
flash_freq = 80m
flash_size = 4M

[c_modules]
; User C modules. true to enable, false to disable. Names are lowercase.
adc = true
bit = true
dht = true
file = true
gpio = true
i2c = true
mqtt = true
net = true
node = true
ow = true
pwm = true
spi = true
tmr = true
uart = true
wifi = true
; ws2812 = false
; Optional subdirectory modules
; coap = false
; http = false
; pcm = false
; sjson = false
; tsl2561 = false
; websocket = false
; u8g2 = false
; ucg = false

[devices]
; MAC-derived UUIDs approved for this workspace.
uuids =

[lua_modules]
; Map a project-local name to a .lua file or a remote URL.
; bh1750 = lua/bh1750.lua
; gossip = https://github.com/nodemcu/nodemcu-firmware/raw/master/lua_modules/gossip/gossip.lua

[flash]
; Optional: extra files flashed at specific offsets (e.g. SPIFFS image).
; extra_files = spiffs.bin@0x100000

[build]
parallel = true
verbose = false
