[nodemcu]
lua_version=51
lua_number_integral=false
lua_number_64bits=false
port=/dev/ttyUSB0
baud=460800
upload_baud=460800
flash_mode=dio
flash_freq=80m
flash_size=4M
parallel=true
verbose=false
src=src

[devices]
uuids=

[sync]
last_timestamp=

[c_modules]
file=true
adc=true
bit=true
dht=true
gpio=true
i2c=true
mqtt=true
net=true
node=true
ow=true
pwm=true
spi=true
tmr=true
uart=true
wifi=true

[flash]
extra_files=

[build]
parallel=true
verbose=false
ssl_buffer_size=4096
; lfs_size: LFS (Lua Flash Store) partition size, e.g. 0x20000 (128 KB). 0
; disables LFS. luac.cross is fetched as a prebuilt binary (no host compiler
; needed). Use "NodeMCU: Enable LFS" to set this and deploy modules to flash.
lfs_size=0

; Optional graphics sections control which u8g2/ucg fonts and display drivers
; are compiled into the firmware. Leave them out to keep the firmware defaults.
; When you reference a font in Lua (e.g. u8g2.font_logisoso16_tf) that isn't
; compiled in, a warning + "Compile font" quick-fix will populate these for you.
; [u8g2_fonts]
; font_6x10_tf=true
; [u8g2_displays]
; ssd1306_i2c_128x64_noname=true
; [ucg_fonts]
; font_ncenR14_hr=true
; [ucg_displays]
; ili9341_18x240x320_hw_spi=true
