name: Build prebuilt luac.cross

# Cross-builds the LFS image compiler for the 3 valid Lua flavours and the
# 3 host platforms + 2 architectures, and attaches the archives to the GitHub
# release that matches the firmware fork tag (e.g. `v3.1.0`).
#
# Triggered:
#   - automatically on every `v*` tag push (alongside the Build and Publish
#     workflow), so a release ships its prebuilt binaries together with the VSIX
#   - manually via `workflow_dispatch` (inputs: firmwareTag, releaseTag)
#
# The firmware fork tag (e.g. `v3.1.0`) and the extension release tag (e.g.
# `v0.3.3`) are independent. They are resolved separately:
#   - FW_TAG (which firmware zip to download + build): the `firmwareTag` input on
#     a manual run, else the fixed `v3.1.0` default on a tag push. This must track
#     `MANAGED_FIRMWARE_TAG` in src/firmware/managedFirmware.ts.
#   - release tag (where the archives are attached): the `releaseTag` input on a
#     manual run, else `github.ref_name` (the pushed extension tag). This must
#     match `DEFAULT_PREBUILT_RELEASE.releaseTag` in src/firmware/prebuiltLuacCross.ts.
#
# The NodeMCU firmware itself is downloaded from caiohamamura/nodemcu-firmware
# at FW_TAG and built only up to the host tool stage — the xtensa firmware
# compile is skipped (we don't need the firmware binary, just `luac.cross` /
# `luac.cross.int`).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      firmwareTag:
        description: "Firmware fork tag to build against (e.g. v3.1.0)"
        required: true
        default: "v3.1.0"
      releaseTag:
        description: "Extension release tag to attach archives to (e.g. v0.3.3). Defaults to the pushed tag."
        required: false

permissions:
  contents: write

jobs:
  prebuilts:
    name: "${{ matrix.flavour }} on ${{ matrix.target }}"
    strategy:
      # Don't auto-cancel in-flight jobs: each archive is small, and a partial
      # matrix (some archives built, others not) is worse than waiting.
      fail-fast: false
      matrix:
        include:
          # linux x64 (native on the GH runner)
          - { flavour: lua53,     binary: luac.cross,     target: linux-x64,    os: ubuntu-24.04 }
          - { flavour: lua51,     binary: luac.cross,     target: linux-x64,    os: ubuntu-24.04 }
          - { flavour: lua51-int, binary: luac.cross.int, target: linux-x64,    os: ubuntu-24.04 }
          # macOS arm64 (Apple Silicon). macos-13 / macos-14 runners are
          # retired or deprecating (see actions/runner-images#13518). x64
          # (Intel) coverage was dropped: no active runner label, and Intel
          # macOS support ends Aug 2027. `darwin-arm64` is the asset target
          # name; prebuiltLuacCross.ts does not need to know the runner
          # image changed.
          - { flavour: lua53,     binary: luac.cross,     target: darwin-arm64, os: macos-15 }
          - { flavour: lua51,     binary: luac.cross,     target: darwin-arm64, os: macos-15 }
          - { flavour: lua51-int, binary: luac.cross.int, target: darwin-arm64, os: macos-15 }
          # Windows x64 + arm64
          - { flavour: lua53,     binary: luac.cross.exe,     target: win32-x64,    os: windows-2022 }
          - { flavour: lua51,     binary: luac.cross.exe,     target: win32-x64,    os: windows-2022 }
          - { flavour: lua51-int, binary: luac.cross.int.exe, target: win32-x64,    os: windows-2022 }
          - { flavour: lua53,     binary: luac.cross.exe,     target: win32-arm64,  os: windows-2022 }
          - { flavour: lua51,     binary: luac.cross.exe,     target: win32-arm64,  os: windows-2022 }
          - { flavour: lua51-int, binary: luac.cross.int.exe, target: win32-arm64,  os: windows-2022 }

    runs-on: ${{ matrix.os }}
    env:
      # Firmware fork tag to build against. Manual run: the firmwareTag input.
      # Tag push: the fixed v3.1.0 default (the extension tag in github.ref_name
      # is NOT a firmware tag). Keep in sync with MANAGED_FIRMWARE_TAG.
      FW_TAG: ${{ github.event.inputs.firmwareTag || 'v3.1.0' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware
        shell: bash
        run: |
          set -e
          FW_DIR="firmware/inner"
          mkdir -p "$FW_DIR"
          curl -fsSL "https://github.com/caiohamamura/nodemcu-firmware/archive/refs/tags/${FW_TAG}.zip" -o fw.zip
          unzip -q fw.zip
          # GitHub's zipball for tag `v3.1.0` extracts to
          # `nodemcu-firmware-3.1.0/` (no `v` prefix on the directory name).
          # Discover the top-level entry rather than assuming the format so
          # this stays correct for any future tag.
          TOP_DIR=$(unzip -Z1 fw.zip | head -1 | cut -d/ -f1)
          if [ -z "$TOP_DIR" ] || [ ! -d "$TOP_DIR" ]; then
            echo "Could not find extracted top-level directory in fw.zip"
            unzip -Z1 fw.zip | head -5
            exit 1
          fi
          # Move the contents (not the wrapper dir) so the resulting layout
          # matches what the extension's managed-firmware cache produces.
          # Enable dotglob so .gitmodules / .github/ / .gdbinit aren't left
          # behind (they would block the `rmdir` below).
          shopt -s dotglob
          mv "$TOP_DIR"/* "$FW_DIR/"
          shopt -u dotglob
          rmdir "$TOP_DIR"
          # Apply the two compat patches the extension applies to managed
          # firmware (see src/firmware/managedFirmware.ts:applyCompatibilityPatches).
          # The prebuilts must be byte-identical to what a user builds locally.
          cat > "$FW_DIR/app/nodemcu-vscode-newlib.c" <<'NEWLIB_EOF'
          #include <stddef.h>

          struct _reent;

          extern void *malloc(size_t size);
          extern void free(void *ptr);
          extern void *realloc(void *ptr, size_t size);

          void *_malloc_r(struct _reent *reent, size_t size)
          {
            (void)reent;
            return malloc(size);
          }

          void _free_r(struct _reent *reent, void *ptr)
          {
            (void)reent;
            free(ptr);
          }

          void *_realloc_r(struct _reent *reent, void *ptr, size_t size)
          {
            (void)reent;
            return realloc(ptr, size);
          }
          NEWLIB_EOF
          python3 -c "
          import pathlib
          p = pathlib.Path('$FW_DIR/app/CMakeLists.txt')
          t = p.read_text()
          t = t.replace('add_executable(\${EXECUTABLE_NAME} dummy.c)', 'add_executable(\${EXECUTABLE_NAME} dummy.c nodemcu-vscode-newlib.c)', 1)
          p.write_text(t)
          "
          cat > "$FW_DIR/tools/luac_cross/nodemcu-vscode-luac-assert.c" <<'ASSERT_EOF'
          #include <lua.h>
          #include <lauxlib.h>
          void luaL_assertfail(lua_State *L, const char *msg) {
            (void)L; (void)msg;
          }
          ASSERT_EOF
          # Patch app/lua/luac_cross/luac.c: the LFS declaration
          # `extern uint dumpToFlashImage(...)` only defines the `uint`
          # typedef for MSVC/MinGW. Apple Clang and GCC (Linux + macOS)
          # need it too, otherwise the lua51/lua51-int build fails with
          # `error: unknown type name 'uint'`. lua53 uses a different
          # luac.c and does not need this. Expand the guard.
          python3 -c "
          import pathlib
          p = pathlib.Path('$FW_DIR/app/lua/luac_cross/luac.c')
          t = p.read_text()
          old = '#if defined(_MSC_VER) || defined(__MINGW32__)\ntypedef unsigned int uint;\n#endif'
          new = '#if defined(_MSC_VER) || defined(__MINGW32__) || defined(__GNUC__) || defined(__clang__)\ntypedef unsigned int uint;\n#endif'
          if old not in t:
            raise SystemExit('Expected uint typedef block not found in luac.c')
          t = t.replace(old, new, 1)
          p.write_text(t)
          "
          echo "Firmware prepared at $(pwd)/$FW_DIR"

      - name: Compute cmake flags
        id: flags
        shell: bash
        run: |
          case "${{ matrix.flavour }}" in
            lua53)     echo "lua=53" >> "$GITHUB_OUTPUT"; echo "integral=" >> "$GITHUB_OUTPUT" ;;
            lua51)     echo "lua=51" >> "$GITHUB_OUTPUT"; echo "integral=" >> "$GITHUB_OUTPUT" ;;
            lua51-int) echo "lua=51" >> "$GITHUB_OUTPUT"; echo "integral=-DLUA_NUMBER_INTEGRAL=ON" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "target=${{ matrix.binary }}" >> "$GITHUB_OUTPUT"

      - name: Configure
        working-directory: ${{ github.workspace }}/firmware/inner
        shell: bash
        run: |
          set -e
          GENERATOR="Unix Makefiles"
          if [ "${{ runner.os }}" = "Windows" ]; then GENERATOR="Ninja"; fi
          cmake -S . -B build -G "$GENERATOR" \
            -DLUA=${{ steps.flags.outputs.lua }} \
            ${{ steps.flags.outputs.integral }} \
            -DBUILD_HOST_TOOLS=ON

      - name: Build
        working-directory: ${{ github.workspace }}/firmware/inner
        shell: bash
        run: cmake --build build --target ${{ matrix.flavour == 'lua51-int' && 'luac.cross.int' || 'luac.cross' }} -j

      - name: Verify the binary reports the right Lua version
        working-directory: ${{ github.workspace }}/firmware/inner
        shell: bash
        run: |
          set -e
          BIN="build/tools/luac_cross/${{ steps.flags.outputs.target }}"
          if [ ! -f "$BIN" ]; then
            echo "Binary not found at $BIN"
            ls -la build/tools/luac_cross/ || true
            exit 1
          fi
          case "${{ matrix.flavour }}" in
            lua53)     EXPECT='Lua 5.3' ;;
            lua51)     EXPECT='Lua 5.1' ;;
            lua51-int) EXPECT='Lua 5.1' ;;
          esac
          OUT=$("$BIN" -v 2>&1 || true)
          echo "Got: $OUT"
          echo "Want: $EXPECT"
          echo "$OUT" | grep -q "$EXPECT" || { echo "MISMATCH"; exit 1; }

      - name: Package
        id: package
        working-directory: ${{ github.workspace }}/firmware/inner
        shell: bash
        run: |
          set -e
          ASSET="luac-cross-${FW_TAG}-${{ matrix.flavour }}-${{ matrix.target }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXT="zip"
          else
            EXT="tar.gz"
          fi
          ASSET="${ASSET}.${EXT}"
          STAGE="$(mktemp -d)"
          cp "build/tools/luac_cross/${{ steps.flags.outputs.target }}" "$STAGE/"
          BIN_BASE=$(basename "${{ steps.flags.outputs.target }}")
          if [ "$EXT" = "tar.gz" ]; then
            tar -C "$STAGE" -czf "$ASSET" "$BIN_BASE"
          else
            # PowerShell Compress-Archive needs native Windows paths
            # (e.g. D:\a\...\tmp\xxx\luac.cross.exe), not the POSIX-style
            # /tmp/... produced by Git Bash mktemp. Convert the stage
            # path with cygpath -w and pass everything through env vars
            # to avoid the bash <-> PowerShell quoting minefield.
            WIN_STAGE=$(cygpath -w "$STAGE")
            WIN_ASSET=$(cygpath -w "$(pwd)/$ASSET")
            export WIN_STAGE WIN_ASSET BIN_BASE
            powershell -NoProfile -Command \
              'Compress-Archive -Path (Join-Path $env:WIN_STAGE $env:BIN_BASE) -DestinationPath $env:WIN_ASSET -Force'
          fi
          ls -la "$ASSET"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          # Extension release tag to attach to: the releaseTag input on a manual
          # run, else the pushed tag. action-gh-release upserts, so it creates
          # the release if the Build and Publish workflow hasn't yet. The
          # prebuilt binaries are indexed by this release tag (not the firmware
          # tag) — must match DEFAULT_PREBUILT_RELEASE.releaseTag.
          tag_name: ${{ github.event.inputs.releaseTag || github.ref_name }}
          files: ${{ github.workspace }}/firmware/inner/${{ steps.package.outputs.asset }}
          fail_on_unmatched_files: true
